    <script>window.DIARY_ENTRIES = [{"id":"2025-01-01:month","date":"2025-01-01","type":"month","text":"拿到交大第50届运动会冠军&金手套，收了俩奖杯。\n第一次在上海拍成冬季银河。\n写完移轴畸变及画面畸变修正器，把我去年十月提出的算法落地。姜文选集中可见。\n尝试完成一个流场检测的程序。"},{"id":"2025-02-01:month","date":"2025-02-01","type":"month","text":"完成图片快速转Markdown内嵌代码工具。这个工具现在在主页的姜文选集中可见。\n加入、学习天洑，研究一个cfd办法。"},{"id":"2025-03-01:month","date":"2025-03-01","type":"month","text":"一个手势识别的项目。学了神经网络，反复调参。\n参与两个综艺拍摄。管摄影指导，一个成了一个没成。俩加一起收益没有，积累了一些经验。"},{"id":"2025-04-01:month","date":"2025-04-01","type":"month","text":"做一个自相关细胞骨架pattern识别算法，原理一点不复杂。见主页姜文选集。学信号分析和小波十讲。\n第一次批量棚拍，效果符合当时预期。"},{"id":"2025-05-01:month","date":"2025-05-01","type":"month","text":"独立完成了一次音乐会的摄制。纯技术角度讲其实还好，主要是事多。七八个机位还有游机编排都得一个人来，比较考验思维缜密性。\n开始考量ptp的dr算法，做基础实验。"},{"id":"2025-06-01:month","date":"2025-06-01","type":"month","text":"对填充率和低通进行建模，完成“这才是真正的锐度…”文以探讨，见姜文选集。\n期末月！"},{"id":"2025-07-01:month","date":"2025-07-01","type":"month","text":"读、翻译ULNCIS（Assim Boukhayma）。\n考量传感器融合输出办法、功率谱。找ISO规范来探讨相机标定。\n给出四平面下缩图解码的问题。\n一个工业区的商业拍摄。\n拍工业基地，交作业。"},{"id":"2025-08-01:month","date":"2025-08-01","type":"month","text":"读、翻译ULNCIS（Assim Boukhayma）。\n研究考量细胞指纹算法以进行分类筛选。\n开始考量CIS偏色问题，给出初步猜测。\n补充说明了解码导致的一个问题，探讨量化噪声。\n为了考察家硕测试流程中的问题，开始写我的位值噪声可视化万能工具（现名Jiangtherapee Online）。"},{"id":"2025-08-01:day","date":"2025-08-01","type":"day","text":""},{"id":"2025-08-22:day","date":"2025-08-22","type":"day","text":"-般黑白CIS工程导论\n笔记结构\n有无源传感器结构介绍\nCIS中的噪声源与机制PTC光子转移曲线与动态范围\n氏噪声CMOS的噪声详细分析\nCIS读出链中的噪声抑制\n在标准CIS工艺下设计压电子读出噪声像素\n亚电子读出噪声VGA成像器特性表征\n用于相关多重采样的无源开关电容电路\n工艺缩减堆CIS光子技术能力的影响\n结论\n12\n彩色CIS及色彩科学导论\n色彩科学导论\n简化的ISP流程概述\n白平衡及其预缩放对PTC等的影响"},{"id":"2025-08-23:day","date":"2025-08-23","type":"day","text":"今天有人问我阶梯是为什么 我直接用佳能analoggain分得粗打发过去了，但真的是因为如此么？很多前照机型的pdr瞎跳又是什么导致的呢？最近在补课色彩科学，实在没时间验证这些。\n给第一章画两张插图，看起来挺简洁（CCDCMOS时序关系）"},{"id":"2025-08-24:day","date":"2025-08-24","type":"day","text":"来和平区拍点东西。拍了我之前住的地方"},{"id":"2025-08-25:day","date":"2025-08-25","type":"day","text":"算了两个高感中灰SNR算例。补充了z72采样的补充说明。\n我刚知道某个群友的网站，在里面学色彩科学\nhttps://jackchou.top"},{"id":"2025-08-26:day","date":"2025-08-26","type":"day","text":"继续学色彩科学。"},{"id":"2025-08-30:day","date":"2025-08-30","type":"day","text":"下午我完成了一个关于加大采样频率不可以减轻jpeg色彩条带问题的证明。\n这个东西是和昨天我的发现有些相悖的。\n因为加大采样频率确实可以降低在高比特管线下超采后的量化噪声（昨天我证明的）。但是渐变情况下，采样的量化噪声协方差会抵消掉这一部分增益。\n晚上审个视频。\n明天看一下新锐展的评论导览。胡叔的。\n完善一下量化和dither的知乎报告\n然后再强调一下slope based。\n给老八视频评论第一条，关于动态范围测试的一些问题。"},{"id":"2025-08-31:day","date":"2025-08-31","type":"day","text":"查证了ISO 12232:2019，回了一下对REI的质疑。\n早上拿到了xyla21的一些提示 目前大概清楚那个人是哪里错了（后面会揭晓） 中午搞到了一本还不错的书看了下 系统学了一半的log"},{"id":"2025-09-01:month","date":"2025-09-01","type":"month","text":"发布图片位值噪声可视化万能工具的第一个桌面版。\n分析细胞计数实验数据，各种数小球。\n发现诸多相机慢速快门不可关闭的降噪。\n继续写位值噪声可视化万能工具，开始尝试学习解码raw与常见压缩算法。"},{"id":"2025-09-01:day","date":"2025-09-01","type":"day","text":"重新考查了rei。发现对于普通滤镜，松下并没有改变同iso下的实际源极增益，但是对vlog这种大幅改变映射的 还是会有一个640-100的降幅。开发了我的libraw软件。还看了伪x3的论文，线性raw，还有arricore。在反思之前为啥我一直觉得是12.7%才是中灰，一直在看iso12232。"},{"id":"2025-09-02:day","date":"2025-09-02","type":"day","text":"去拍了个灯展 凌晨我还在研究imatest，给了一个可能的最大区块选择形式。浪费我太长时间了"},{"id":"2025-09-03:day","date":"2025-09-03","type":"day","text":"imatest为主\n这回xyla21的各阶dr终于正常了。继续标定问题。\n发现截码值导致snr不准。下一步用下降平缓一些的测试。\n搞组里实验。"},{"id":"2025-09-04:day","date":"2025-09-04","type":"day","text":"三个通道 一个软件 搞差不多了 不过kadc还是稳定不下来\n晚上要搞学校实验了"},{"id":"2025-09-05:day","date":"2025-09-05","type":"day","text":"修好了实验平台 明早数格子 问了prescaling和软件版本\n注意选课"},{"id":"2025-09-06:day","date":"2025-09-06","type":"day","text":"学校实验 完善软件 解拜尔直接解 搞定imatest23发现学校实验的阴影问题 进一步对比 0.11ev"},{"id":"2025-09-07:day","date":"2025-09-07","type":"day","text":"昨天一直在做实验 今天看下漏极电流 寄生电流的问题 继续搞imatest"},{"id":"2025-09-08:day","date":"2025-09-08","type":"day","text":"前天没做什么，实验。昨天交完材料，发现了dpr的ettr标版解码错误，发了我b站第四个视频。今天去修电脑。"},{"id":"2025-09-09:day","date":"2025-09-09","type":"day","text":"明早去医院 今天发现我仍不太熟悉色彩空间管理，后面我要好好看下fcp的白皮书了。交流中似乎发现了我标版的问题。感觉今天干的事情好少，尽管我上午去修了个电脑。晚上研究了下选课。写作业。"},{"id":"2025-09-10:day","date":"2025-09-10","type":"day","text":"评估电子快门拍两张照片。回上海了。"},{"id":"2025-09-12:day","date":"2025-09-12","type":"day","text":"社会实践"},{"id":"2025-09-15:day","date":"2025-09-15","type":"day","text":"连着剪了几天片子…没怎么睡"},{"id":"2025-09-16:day","date":"2025-09-16","type":"day","text":"上课 去校队训练 堆了个月亮"},{"id":"2025-09-17:day","date":"2025-09-17","type":"day","text":"极度完善了fft的程序部分。明天去拍一下黑场和暗部细节比较。"},{"id":"2025-09-18:day","date":"2025-09-18","type":"day","text":"开始研究g92搞数据库 发现1600有降噪"},{"id":"2025-09-19:day","date":"2025-09-19","type":"day","text":"确认了是耍猴开关，然后发了那篇《捷里米又被骗了》"},{"id":"2025-09-20:day","date":"2025-09-20","type":"day","text":"初步完成了软件内模拟黑电平改变后重新渲染的效果，我在今天第一次发现黑电平对极暗部颜色的影响。"},{"id":"2025-09-21:day","date":"2025-09-21","type":"day","text":"完成了一个ccm搭配黑电平的玩意。先黑电平再ccm这个明天改一下。但是希望我看看dng规范看看两个前向矩阵怎么直接变换。发了三篇。om1算的时候5抄成6了…"},{"id":"2025-09-22:day","date":"2025-09-22","type":"day","text":"发b站视频"},{"id":"2025-09-23:day","date":"2025-09-23","type":"day","text":"搞清楚了ptp energy spectra的山谷形状是怎么产生的。纳闷为什么双线性导致高频增加。"},{"id":"2025-09-24:day","date":"2025-09-24","type":"day","text":"早上检查g92的es未果。中午研究如何用forwardmatrix和asshotneutral从xyz向srgb转换未果。晚上练临安饮恨未果。测定了g92 sh20/60的ptp pdr curve。发现g92不知为何在无降噪且号称无dag的iso400/800仍表现良好连续的黑场响应。我认为是一个滑动窗口的dag，后面尝试验证。"},{"id":"2025-09-25:day","date":"2025-09-25","type":"day","text":"学了rust语言，第一次尝试编译dng文件"},{"id":"2025-09-26:day","date":"2025-09-26","type":"day","text":"成功通过奇怪的办法用exiftool改了16个黑电平值（其中只有四个有效）。拍楼下的花。"},{"id":"2025-09-27:day","date":"2025-09-27","type":"day","text":"线性点附近qe准，不怎么受降噪影响，可以外推ecount。这个用佳能粗analog的阶梯向上可以交叉验证。佳能大概降噪对暗部比较狠，所以这个r62会出现到达一个analog，更低的digitalgain，readnoiseinputreferred越低的情况。\n看了dxo的iso表，可以和qe交叉验证。不过18中灰有对不上的情况。\n色彩转换矩阵复核一下。要继续搞imatest了。"},{"id":"2025-09-28:day","date":"2025-09-28","type":"day","text":"完成量化分析…验算dxo中灰 大部分拟合很好（0.03档左右）但是a7s3偏得离谱，明天再验算几个。明天看下白电平我搞的对不对。问了量化的一个小问题。第一次看dxo数据库 发现一些数据和ptp的对不上 非常发愁"},{"id":"2025-09-29:day","date":"2025-09-29","type":"day","text":"我在自己测一堆数据点来评判dxo和ptp谁更对。和vps斗争，哎，总算完事了。debug了很多软件的问题。明天我要好好搞xyla了。那个kadc还是差点事，有空按jackchou的说法找一下文档。"},{"id":"2025-09-30:day","date":"2025-09-30","type":"day","text":"推dxo标准失败，但是发现了dxo的错，和ptp没矛盾了"},{"id":"2025-10-01:month","date":"2025-10-01","type":"month","text":"开始认真学高等色度学。\n倒腾并没完全用明白adobe dng sdk。\n尝试构建彩噪量化办法。\n发现的ps的一个堆栈问题并予以改进。\n正式完成暗部偏色矫正办法的论证与实现。\n对简单量化噪声模型的修正。另实验了堆栈下dithering与位深的权衡。\n发现并多方面证实prescaling。"},{"id":"2025-10-01:day","date":"2025-10-01","type":"day","text":"推dxo标准失败。开始看高等色度学。"},{"id":"2025-10-02:day","date":"2025-10-02","type":"day","text":"写文dxo解决。彩噪某种意义上有解了（现已在姜文选集中《彩噪工程导论》）。继续看高等色度学。"},{"id":"2025-10-03:day","date":"2025-10-03","type":"day","text":"写完《这才是真正的色彩科学》。"},{"id":"2025-10-06:day","date":"2025-10-06","type":"day","text":"连着干了两天dng sdk 试错了几十个小时。学习pidng、tinydng、tiffile，星轨仪。有点郁闷，晚上去拍了月亮。"},{"id":"2025-10-07:day","date":"2025-10-07","type":"day","text":"想办法完成了解拜尔前堆栈。"},{"id":"2025-10-08:day","date":"2025-10-08","type":"day","text":"凌晨我完成了黑电平缩放的代码简单实现。"},{"id":"2025-10-09:day","date":"2025-10-09","type":"day","text":"完成了两件事：1，堆栈snr对照以及提升办法；2，黑电平重缩放解决方案的彻底落地。"},{"id":"2025-10-11:day","date":"2025-10-11","type":"day","text":"10~11号：给500定拍了点样张，写了那篇量化噪声干扰极暗部PTC曲线的。解释完毕佳能的特殊偏色。"},{"id":"2025-10-12:day","date":"2025-10-12","type":"day","text":"拍摄艺术团。继续修正量化噪声。"},{"id":"2025-10-13:day","date":"2025-10-13","type":"day","text":"分析了一下那个堆栈的事和量化噪声随堆栈的变化 这个还是很开创性的 我比较满意"},{"id":"2025-10-14:day","date":"2025-10-14","type":"day","text":"搞了7205，别的没干 写作业"},{"id":"2025-10-15:day","date":"2025-10-15","type":"day","text":"回应戈多 看wavechaser 拍大画幅。"},{"id":"2025-10-16:day","date":"2025-10-16","type":"day","text":"搞了一通去除pattern noise，频闪条带。然后写完了关于s5填充率的稿子。明天成视频，要干的东西我和jin说了。"},{"id":"2025-10-17:day","date":"2025-10-17","type":"day","text":"发了视频 搞70200 明天接着修。"},{"id":"2025-10-18:day","date":"2025-10-18","type":"day","text":"拍了个东西，写了个网站。待会研究jpg的gainmap以良好测得动态。"},{"id":"2025-10-19:day","date":"2025-10-19","type":"day","text":"剪视频 学hdr 分析彩噪。"},{"id":"2025-10-20:day","date":"2025-10-20","type":"day","text":"考试。尼康完结，画色域图。"},{"id":"2025-10-21:day","date":"2025-10-21","type":"day","text":"凸分析。"},{"id":"2025-10-22:day","date":"2025-10-22","type":"day","text":"写完色彩科学下篇 证完凸包。明天搞彩噪以及具体色域优劣叙述。"},{"id":"2025-10-26:day","date":"2025-10-26","type":"day","text":"写完色准模拟网页，全系统显色模拟器。规范了一些言论等。"},{"id":"2025-10-27:day","date":"2025-10-27","type":"day","text":"搞定色彩的所有软件了。想移植snr软件，未果。什么时候解封了搞搞彩噪吧，之类的，仔细想一想。"},{"id":"2025-10-29:day","date":"2025-10-29","type":"day","text":"研究了两天prescale，获得了一定程度上的支持。通过观察1600 规避坏点。搞录音。"},{"id":"2025-10-30:day","date":"2025-10-30","type":"day","text":"比较镜头光圈网页，找到了一些音频文档。"},{"id":"2025-11-01:month","date":"2025-11-01","type":"month","text":"依靠彩噪量化办法完成了7rm3、7_2的定论。这个问题困扰了我半年。\n考量一些机器的颜色问题。\n尝试录音，但没精力在这个领域研究太多了。超级大翻车。\n写解码的wasm实现，把位值噪声可视化万能工具搬到网页上。\n推导dxo测试条件。"},{"id":"2025-11-01:day","date":"2025-11-01","type":"day","text":""},{"id":"2025-11-02:day","date":"2025-11-02","type":"day","text":"写彩色噪声，调试音频，拿采集卡。"},{"id":"2025-11-06:day","date":"2025-11-06","type":"day","text":"前段时间准备期中了。前天看r3和72的dxo18snr，昨天仔细考察了滤色片的cmf发现了几个定律。在写神之一手3."},{"id":"2025-11-10:day","date":"2025-11-10","type":"day","text":"录音，录像，直播，照片"},{"id":"2025-11-14:day","date":"2025-11-14","type":"day","text":"考完期中了，回来了 r4 r5颜色问题，彩噪分析继续。"},{"id":"2025-11-15:day","date":"2025-11-15","type":"day","text":"进一步加深了对ptp黑盒的理解"},{"id":"2025-11-16:day","date":"2025-11-16","type":"day","text":"一直在考虑ptc 明天开始拟合 先视频剪了"},{"id":"2025-11-17:day","date":"2025-11-17","type":"day","text":"完成视频 解决暗部偏色"},{"id":"2025-11-18:day","date":"2025-11-18","type":"day","text":"看小波十讲。"},{"id":"2025-11-19:day","date":"2025-11-19","type":"day","text":"发了几篇。仔细对比，应用了我的算法。决定退键了。更新一下我的彩噪模拟网页，加入prescaling。"},{"id":"2025-11-20:day","date":"2025-11-20","type":"day","text":"定论7372.通过直接在表上划线。发完视频。"},{"id":"2025-11-21:day","date":"2025-11-21","type":"day","text":"划线完成，3050 6700 6600完成。"},{"id":"2025-11-22:day","date":"2025-11-22","type":"day","text":"修官网，去聚餐。"},{"id":"2025-11-23:day","date":"2025-11-23","type":"day","text":"改我的位值程序。练琴。写了两段，一个给徐一个给文。"},{"id":"2025-12-01:month","date":"2025-12-01","type":"month","text":"报告了一个关于血小板边缘化的现象。复现，处理垂直轴方向切片的图像。\n位值噪声可视化万能工具成功移植到WebAssembly。更名为Jiangtherapee。\n完成了对降噪线性度的测量，发表一种高码值下获取严格平场的办法。"},{"id":"2025-12-01:day","date":"2025-12-01","type":"day","text":""},{"id":"2025-12-06:day","date":"2025-12-06","type":"day","text":"划了多长时间啊。半个多月？总算写完了软件 jiangtherapee。反正从上个日记到现在一直在写。早上去测了a75画质，用我的暗部偏色矫正算法做到12档拉回。"},{"id":"2025-12-08:day","date":"2025-12-08","type":"day","text":"三天紧锣密鼓解决a75战斗。"},{"id":"2025-12-14:day","date":"2025-12-14","type":"day","text":"解决fft反推降噪前。s12 dgo 完成jiangtherapee的fftlab啥的 前几天完成了一种创造绝对平场的方法"},{"id":"2025-12-16:day","date":"2025-12-16","type":"day","text":"加入2d能量谱以及计算 反推降噪前 算了几个平场和绝对漂亮的数据"},{"id":"2025-12-17:day","date":"2025-12-17","type":"day","text":"今天留下一个很小的记号，提醒自己没有白过。"},{"id":"2026-01-01:day","date":"2026-01-01","type":"day","text":""},{"id":"2026-01-15:day","date":"2026-01-15","type":"day","text":"期末周 写cm拟合程序的jtr 算sfr 推出uv方向sfr换算 z8的低码值专属scale猜测"},{"id":"2026-01-16:day","date":"2026-01-16","type":"day","text":"总算搓完了sfr管线"},{"id":"2026-01-18:day","date":"2026-01-18","type":"day","text":"分析解混渲染锯齿"},{"id":"2026-01-19:day","date":"2026-01-19","type":"day","text":"继续搞sfr，搞到了z8，搞hist的stack，猜测低码值。"},{"id":"2026-01-21:day","date":"2026-01-21","type":"day","text":"终于会封装了 写CM。"},{"id":"2026-02-16:day","date":"2026-02-16","type":"day","text":"webgpu功能，step1速度可接受，ui不行，step2速度感觉没啥变化。"},{"id":"2026-02-18:day","date":"2026-02-18","type":"day","text":"继续写高光恢复算法"},{"id":"2026-02-19:day","date":"2026-02-19","type":"day","text":"立项PSMODE。写高位深管线。"},{"id":"2026-02-20:day","date":"2026-02-20","type":"day","text":"仔细排查 检查了堆栈发紫的问题，晚上写自动对齐代码。"},{"id":"2026-02-21:day","date":"2026-02-21","type":"day","text":"写amaze，写drizzle算法"},{"id":"2026-02-22:day","date":"2026-02-22","type":"day","text":"实在做不来超分我就不做了，但是对齐必须先搞好要不然根本没有可用性。对齐必须做到无愧于自己的使用。起码我做天象拍摄，我需要第一时间想到我的软件。一般的对齐需要这么复杂吗？比如我去选择ps里面的对齐似乎闪电也不会对爆炸。我还想起来就是索尼和尼康也有一般像素上的相位点，这部分插值也会带来一些像降噪的东西"},{"id":"2026-02-23:day","date":"2026-02-23","type":"day","text":"然后是对齐算法，我写了两个了，效果各有千秋，不是第一个边缘出问题就是第二个出锯齿，总之就说有没有吧。尝试加了opencv.js，但是失败了"},{"id":"2026-02-24:day","date":"2026-02-24","type":"day","text":"早上在写视频稿子，完善了高光恢复算法，中午发了个新视频，那个尼康的黑白改机以及彻底把prescaling搬上台面\n下午六点之后继续捯饬对齐算法 现在很慢但是有了一个鲁棒性很强的办法了。\n我之前在对齐算法上绕路太久是因为我太理想主义去搞那些分块金字塔拼贴的算法。实际毫无意义。\n先按照最基本的写了一个，起码不至于不能用了。明天@括.咎 有空吗？别忘了。明天我再优化一下速度，以及开始从对齐向超分演变。超分自由度比随便对齐少多了，实现起来应当更为容易。"},{"id":"2026-02-25:day","date":"2026-02-25","type":"day","text":"2026 寒假总结（26.2.1-26.2.25）\n主线任务是准备开学考和免修考，复现学长论文，这个不说了\n然后是一上来的两件事情 确认了摇摇乐两种情况下的画质差异以及dithering行为。\n完善了jiangtherapee的stacklab，确认锅在adobe的管线精度。给出jdng格式容纳float32，是改的32的tiff。\n搞sfrlab，写教程但是只开了头，因为我觉得应当添加三平面支持。改进了iso12233的一些规定（我精确测量了需要改掉奇怪的鲁棒性设计）。\n写jiangtherapee的ps mode部分，也就是一个线上lightroom\n发现z8在iso64的程序错误，给出非常简单的改善算法\n给出尼康黑白改机的高光恢复算法。\n研究超分辨率以及图像对齐/接片有关算法。\n练琴，想给手腕拍片子但是没约上号"},{"id":"2026-02-26:day","date":"2026-02-26","type":"day","text":"今早我起得很晚。整理了jiangtherapee的三种对齐方式与开源的对比。虽然不能满意，但是比所有开源解决都更稳定了，这很出乎意料。下午我尝试做一些讲解视频。晚上又登陆了一下很久没玩过的游戏，想接着玩了。感觉下午的时间好快，我啥也没干。"},{"id":"2026-02-27:day","date":"2026-02-27","type":"day","text":"一早赶路。路上review了一遍我之前的视频，发现了一个小问题，补了一句。\n到上海后弹琴，大概六个小时。感觉手的力量有些进步，基本把肖练弹下来了。三角断了一个击弦机，只好去弹立式。\n明天挂个号，换13u看看闲鱼，然后再测一下sfrlab的拟合等，开始给出教程。"},{"id":"2026-02-28:day","date":"2026-02-28","type":"day","text":"准备开学考"},{"id":"2026-03-01:day","date":"2026-03-01","type":"day","text":"复核了一遍梳插不会导致偏离一般建模；待讨论有方向性插值的影响。确认了cra畸变色差等并不是在dng写入层面矫正；把百年涅槃剪辑重新对轨，明天要继续搞射雕。"},{"id":"2026-03-02:day","date":"2026-03-02","type":"day","text":"起床就上课去了。写了sfrlab三通道的支持，正在重新设计ui，比对解拜耳算法对测得sfr的影响。发现家硕的又一错误。\n练琴。"},{"id":"2026-03-03:day","date":"2026-03-03","type":"day","text":"发了个知乎修了个图，继续完善sfrlab（三通道的时候发现amaze还原度极高待复查）。\n速成prp 有录音。开会和教授论述集scale。练琴。"},{"id":"2026-03-04:day","date":"2026-03-04","type":"day","text":"初步定下来一个新的细胞课题。\n明天要加紧结题了。这个新的课题有助于我上个结题答辩。"},{"id":"2026-03-05:day","date":"2026-03-05","type":"day","text":"起草完论文了，联系好了进一步的实验。\n测完了imx989。\n练琴。"},{"id":"2026-03-06:day","date":"2026-03-06","type":"day","text":"写完结题报告了。重新考量了g92的合成办法，还未定论。\n想要以此引申出一些pcc评估码值谱相关性的行为。独立于空域降噪，不过还没有什么头绪。这样可以区分dithering与涂抹。当然拍摄高码值差分帧平
