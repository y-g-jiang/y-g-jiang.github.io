<head>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: {
                            800: '#1e293b',
                            900: '#0f172a',
                        },
                        cyan: {
                            400: '#22d3ee',
                            500: '#06b6d4',
                            600: '#0891b2',
                        },
                        blue: {
                            500: '#3b82f6',
                        },
                        amber: {
                            400: '#fbbf24',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .gradient-text {
            background-image: linear-gradient(to right, #22d3ee, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        /* 页面滚动条美化 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        /* Light mode default */
        ::-webkit-scrollbar-track {

        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {

        /* Dark mode overrides */

            background: #0f172a;
        }

        }

<link rel="stylesheet" href="/index.css">
<script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/"
  }
}
</script>
  <script type="module" crossorigin src="/assets/index-7EBxjr7t.js"></script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-200 font-sans antialiased transition-colors duration-300">
    <div id="root"></div>
    <script>
        (() => {
            const insertDngOutputLink = () => {
                if (document.getElementById('dng-output-link-box')) return true;
                const heading = Array.from(document.querySelectorAll('h2'))
                    .find(el => el.textContent && el.textContent.includes('相关链接与文档'));
                if (!heading || !heading.parentElement) return false;
                const linkList = Array.from(heading.parentElement.children)
                    .find(el => el !== heading && el.querySelector && el.querySelector('a'));
                if (!linkList) return false;

                const box = document.createElement('div');
                box.id = 'dng-output-link-box';
                box.className = 'mb-4 rounded-lg border border-cyan-200 bg-cyan-50 px-4 py-3 text-slate-800 shadow-sm dark:border-cyan-700/60 dark:bg-slate-900/50 dark:text-slate-100';

                const label = document.createElement('span');
                label.className = 'font-semibold';
                label.textContent = '输出无偏色的DNG：';

                const link = document.createElement('a');
                link.className = 'text-cyan-600 underline decoration-cyan-300 underline-offset-4 hover:text-cyan-700 dark:text-cyan-300 dark:hover:text-cyan-200 break-all';
                link.href = 'https://zhuanlan.zhihu.com/p/2001361388094919587';
                link.target = '_blank';
                link.rel = 'noopener noreferrer';
                link.textContent = 'https://zhuanlan.zhihu.com/p/2001361388094919587';

                box.append(label, link);
                heading.parentElement.insertBefore(box, linkList);
                return true;
            };

            if (!insertDngOutputLink()) {
                const observer = new MutationObserver(() => {
                    if (insertDngOutputLink()) observer.disconnect();
                });
                observer.observe(document.getElementById('root') || document.body, { childList: true, subtree: true });
                window.addEventListener('load', insertDngOutputLink, { once: true });
            }
        })();
    </script>
</body>
</html>
